version: '3.8'

services:
  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: bonebet-redis
    restart: unless-stopped
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # BoneBET API
  api:
    build: .
    container_name: bonebet-api
    restart: unless-stopped
    ports:
      - "8007:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/bonebet.db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_TTL=3600
      - CS2_API_BASE_URL=${CS2_API_BASE_URL:-http://host.docker.internal:8005}
      - CS2_API_TIMEOUT=30
      - CS2_API_MAX_RETRIES=3
      - AI_PROVIDER=${AI_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - bonebet_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
  bonebet_data: